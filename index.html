<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Article</title>

<style>
body {
  font-family: Georgia, serif;
  margin: 0;
  background: #fff;
  color: #111;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

/* Top Category */
.category {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.category img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

.category-text {
  font-size: 16px;
  font-weight: bold;
}

/* Author */
.author {
  color: gray;
  font-size: 14px;
  margin-top: 3px;
}

/* Headline */
.headline {
  font-size: 28px;
  font-weight: bold;
  margin-top: 15px;
  line-height: 1.3;
}

/* Image */
.news-image {
  width: 100%;
  margin-top: 15px;
  border-radius: 5px;
}

/* Date & stats */
.meta {
  color: gray;
  font-size: 14px;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">

  <!-- US News Category -->
  <div class="category">
    <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg">
    <div>
      <div class="category-text">US News</div>
      <div class="author">Jill McLaughlin</div>
    </div>
  </div>

  <!-- Headline -->
  <div class="headline">
    Texas Judge Dismisses X Corp’s Antitrust Lawsuit Against Advertisers
  </div>

  <!-- Image -->
  <img class="news-image" src="https://images.unsplash.com/photo-1603415526960-f7e0328a9cbb?w=1200">

  <!-- Meta -->
  <div class="meta">
    Mar 26 • 5 comments
  </div>

</div>

</body>
</html>
